# Exact dependency lock for bit-level reproduction of the paper's environment.
#
# Captured on the paper's setup: Linux, Python 3.12, CUDA 13 (single H100).
# For NORMAL installation use `pip install -e .` (constraints in pyproject.toml);
# use this lock only to pin the exact tested versions:
#     pip install -r requirements.lock && pip install -e . --no-deps
#
# Platform-specific caveats:
#   * torch / torchvision / triton / nvidia-*-cu13 wheels are built for CUDA 13;
#     on a different CUDA/OS, install the matching torch build instead of these.
#   * `en-core-web-lg` is a spaCy model (not on PyPI) — install it with
#     `python -m spacy download en_core_web_lg` (line left commented below).
#
