name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install the CPU torch build so CI does not pull multi-GB CUDA wheels.
      - name: Install CPU PyTorch
        run: pip install "torch>=2.4" torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint (ruff — real-error gate)
        run: ruff check src/dsl_topic tests

      - name: Tests
        run: pytest tests/ -q
